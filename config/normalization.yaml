# Normalization rules applied to raw extracted values.

phone:
  default_country_code: "IN"
  output_format: "E164"      # E164 | NATIONAL | INTERNATIONAL

dates:
  output_format: "YYYY-MM"
  assume_day: 1              # When only month/year is present

normalize_whitespace: true
strip_unicode: false

skills:
  case_sensitive: false
  synonyms:
    "Machine Learning":
      - "ML"
      - "machine learning"
      - "machine-learning"
      - "MachineLearning"
    "Deep Learning":
